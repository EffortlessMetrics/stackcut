name: ci

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  mutants:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Cache cargo-mutants binary
        id: cache-mutants
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-mutants
          key: cargo-mutants-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-mutants
        if: steps.cache-mutants.outputs.cache-hit != 'true'
        run: cargo install cargo-mutants --locked
      - name: Run mutation tests
        run: cargo xtask mutants

  fuzz:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Cache cargo-fuzz binary
        id: cache-fuzz
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fuzz
          key: cargo-fuzz-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-fuzz
        if: steps.cache-fuzz.outputs.cache-hit != 'true'
        run: cargo install cargo-fuzz --locked
      - name: Run fuzz targets (short)
        run: cargo xtask fuzz
